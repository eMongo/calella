<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ff8a5b">
  <title>Calella Photo Challenge</title>
  <style>
    :root {
      --sun: #ffd166;
      --coral: #ff6b6b;
      --pink: #f15bb5;
      --ocean: #00b4d8;
      --deep: #073b4c;
      --foam: rgba(255, 255, 255, 0.72);
      --glass: rgba(255, 255, 255, 0.22);
      --glass-strong: rgba(255, 255, 255, 0.34);
      --shadow: 0 24px 70px rgba(7, 59, 76, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      background: #ff8a5b;
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.45), transparent 17rem),
        radial-gradient(circle at 84% 12%, rgba(255, 209, 102, 0.75), transparent 14rem),
        radial-gradient(circle at 75% 74%, rgba(0, 180, 216, 0.72), transparent 18rem),
        linear-gradient(135deg, #ff7a59 0%, #f15bb5 42%, #00b4d8 100%);
    }

    body::before,
    body::after {
      position: fixed;
      inset: auto;
      z-index: 0;
      pointer-events: none;
      color: rgba(255, 255, 255, 0.26);
      font-size: clamp(7rem, 24vw, 15rem);
      line-height: 1;
      filter: drop-shadow(0 18px 22px rgba(7, 59, 76, 0.12));
      animation: floaty 7s ease-in-out infinite;
    }

    body::before {
      content: "🌴";
      left: -1.8rem;
      bottom: 2.2rem;
      transform: rotate(-14deg);
    }

    body::after {
      content: "🌊";
      right: -1.6rem;
      top: 4.8rem;
      animation-delay: -2.5s;
    }

    .app {
      position: relative;
      z-index: 1;
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 28px 16px;
    }

    .shell {
      width: min(100%, 720px);
    }

    header {
      margin-bottom: 22px;
      text-align: center;
      animation: riseIn 650ms ease both;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 8vw, 4.7rem);
      line-height: 1.03;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 8px 30px rgba(7, 59, 76, 0.28);
    }

    .tagline {
      margin: 12px auto 0;
      color: rgba(255, 255, 255, 0.9);
      font-size: clamp(1rem, 3.6vw, 1.35rem);
      font-weight: 700;
      text-shadow: 0 4px 18px rgba(7, 59, 76, 0.22);
    }

    main {
      display: grid;
      gap: 16px;
    }

    .challenge-card,
    .complete-card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 34px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.33), rgba(255, 255, 255, 0.16));
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .challenge-card {
      min-height: 360px;
      padding: clamp(24px, 7vw, 48px);
      animation: riseIn 750ms 120ms ease both;
    }

    .challenge-card::before {
      content: "";
      position: absolute;
      inset: -45% -30% auto auto;
      width: 70%;
      aspect-ratio: 1;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.34), transparent 65%);
    }

    .challenge-content {
      display: grid;
      min-height: 220px;
      align-content: center;
      gap: 20px;
      transition: opacity 240ms ease, transform 240ms ease;
    }

    .challenge-content.is-changing {
      opacity: 0;
      transform: translateY(12px) scale(0.985);
    }

    .challenge-en {
      margin: 0;
      color: #fff;
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 950;
      line-height: 1.05;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 10px 34px rgba(7, 59, 76, 0.25);
    }

    .challenge-es,
    .challenge-da {
      margin: 0;
      color: rgba(255, 255, 255, 0.86);
      font-size: clamp(1.12rem, 4.8vw, 1.75rem);
      font-style: italic;
      font-weight: 700;
      line-height: 1.28;
      text-wrap: balance;
      text-shadow: 0 7px 22px rgba(7, 59, 76, 0.18);
    }

    .challenge-da {
      color: rgba(255, 255, 255, 0.82);
      font-size: clamp(1rem, 4.2vw, 1.5rem);
    }

    .actions {
      display: grid;
      gap: 12px;
      animation: riseIn 750ms 220ms ease both;
    }

    button,
    .upload-link {
      width: 100%;
      min-height: 58px;
      border: 0;
      border-radius: 22px;
      padding: 16px 18px;
      cursor: pointer;
      font: inherit;
      font-size: 1.04rem;
      font-weight: 900;
      letter-spacing: 0;
      text-align: center;
      text-decoration: none;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
      touch-action: manipulation;
    }

    .new-button {
      background: linear-gradient(135deg, #fff7b0, #ffd166 40%, #ff8a5b);
      color: #6d2f00;
      box-shadow: 0 18px 38px rgba(109, 47, 0, 0.2);
    }

    .upload-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.25);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.38);
      box-shadow: 0 16px 32px rgba(7, 59, 76, 0.16);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    button:hover,
    .upload-link:hover {
      transform: translateY(-3px);
    }

    .new-button:hover {
      box-shadow: 0 22px 44px rgba(109, 47, 0, 0.25);
    }

    .upload-link:hover {
      background: rgba(255, 255, 255, 0.34);
      box-shadow: 0 20px 40px rgba(7, 59, 76, 0.2);
    }

    button:active,
    .upload-link:active {
      transform: translateY(0) scale(0.99);
    }

    .complete-card {
      display: none;
      padding: 18px 20px;
      text-align: center;
      color: #fff;
      font-size: 1.06rem;
      font-weight: 900;
      animation: popIn 420ms ease both;
    }

    .complete-card.is-visible {
      display: block;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    @media (min-width: 680px) {
      .app {
        padding: 48px 28px;
      }

      .actions {
        grid-template-columns: 1fr 1fr;
      }

      .challenge-card {
        border-radius: 42px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(22px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes floaty {
      0%,
      100% {
        translate: 0 0;
      }
      50% {
        translate: 0 -18px;
      }
    }
  </style>
</head>

      { en: "Take a picture where everyone salutes the snack table.", es: "Tomen una foto donde todos saluden a la mesa de snacks.", da: "Tag et billede, hvor alle hilser snackbordet." },

      { en: "Take a selfie as if you are the official Calella welcome team.", es: "Haz un selfie como si fueran el equipo oficial de bienvenida de Calella.", da: "Tag en selfie, som om I er Calellas officielle velkomstteam." },
      { en: "Make a photo where a chair becomes a friendly throne.", es: "Hagan una foto donde una silla se convierte en un trono simpático.", da: "Lav et billede, hvor en stol bliver en venlig trone." },
      { en: "Act like dessert has just been announced as the main event.", es: "Actúen como si el postre acabara de ser anunciado como evento principal.", da: "Lad som om desserten lige er blevet annonceret som hovedbegivenhed." },
      { en: "Pose like everyone is holding the sunset gently between fingers.", es: "Posen como si todos sostuvieran suavemente el atardecer entre los dedos.", da: "Poser som om alle holder solnedgangen forsigtigt mellem fingrene." },
      { en: "Take a photo of a tiny beach council making big decisions.", es: "Tomen una foto de un pequeño consejo de playa tomando grandes decisiones.", da: "Tag et billede af et lille strandråd, der træffer store beslutninger." },
      { en: "Create a final bonus pose with the biggest smiles of the whole holiday.", es: "Creen una pose extra final con las sonrisas más grandes de todas las vacaciones.", da: "Lav en sidste bonuspose med hele feriens største smil." }
    ];

    extraChallenges.slice(0, 200).forEach((challenge) => {
      challenges.push({ en: challenge.en, es: challenge.es });
      danishTranslations.push(challenge.da);
    });

    const totalChallenges = challenges.length;
    const contentEl = document.getElementById("challengeContent");
    const englishEl = document.getElementById("challengeEn");
    const spanishEl = document.getElementById("challengeEs");
    const danishEl = document.getElementById("challengeDa");
    const completeEl = document.getElementById("completeMessage");
    const newButton = document.getElementById("newChallenge");
    const confettiCanvas = document.getElementById("confetti");
    const confettiContext = confettiCanvas.getContext("2d");

    let deck = [];
    let currentIndex = 0;
    let confettiPieces = [];
    let confettiFrame = null;

    function shuffleDeck() {
      deck = challenges.map((challenge, index) => ({ ...challenge, originalIndex: index }));

      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }

      currentIndex = 0;
    }

    function renderChallenge() {
      const challenge = deck[currentIndex];
      englishEl.textContent = challenge.en;
      spanishEl.textContent = challenge.es;
      danishEl.textContent = danishTranslations[challenge.originalIndex];
    }

    function showNextChallenge() {
      completeEl.classList.remove("is-visible");
      contentEl.classList.add("is-changing");

      window.setTimeout(() => {
        if (currentIndex === totalChallenges - 1) {
          completeEl.classList.add("is-visible");
          launchConfetti();
          shuffleDeck();
        } else {
          currentIndex += 1;
        }

        renderChallenge();
        contentEl.classList.remove("is-changing");
      }, 230);
    }

    function resizeCanvas() {
      confettiCanvas.width = window.innerWidth * window.devicePixelRatio;
      confettiCanvas.height = window.innerHeight * window.devicePixelRatio;
      confettiContext.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    }

    function launchConfetti() {
      resizeCanvas();
      confettiPieces = Array.from({ length: 90 }, () => ({
        x: window.innerWidth / 2 + (Math.random() - 0.5) * 80,
        y: window.innerHeight * 0.25 + (Math.random() - 0.5) * 60,
        size: 5 + Math.random() * 7,
        speedX: (Math.random() - 0.5) * 8,
        speedY: -7 - Math.random() * 7,
        gravity: 0.18 + Math.random() * 0.08,
        rotation: Math.random() * Math.PI,
        spin: (Math.random() - 0.5) * 0.24,
        color: ["#ffd166", "#ff6b6b", "#06d6a0", "#00b4d8", "#f15bb5", "#ffffff"][Math.floor(Math.random() * 6)],
        life: 110 + Math.random() * 35
      }));

      if (confettiFrame) {
        cancelAnimationFrame(confettiFrame);
      }

      animateConfetti();
    }

    function animateConfetti() {
      confettiContext.clearRect(0, 0, window.innerWidth, window.innerHeight);

      confettiPieces.forEach((piece) => {
        piece.x += piece.speedX;
        piece.y += piece.speedY;
        piece.speedY += piece.gravity;
        piece.rotation += piece.spin;
        piece.life -= 1;

        confettiContext.save();
        confettiContext.translate(piece.x, piece.y);
        confettiContext.rotate(piece.rotation);
        confettiContext.fillStyle = piece.color;
        confettiContext.fillRect(-piece.size / 2, -piece.size / 2, piece.size, piece.size * 0.65);
        confettiContext.restore();
      });

      confettiPieces = confettiPieces.filter((piece) => piece.life > 0 && piece.y < window.innerHeight + 40);

      if (confettiPieces.length) {
        confettiFrame = requestAnimationFrame(animateConfetti);
      } else {
        confettiContext.clearRect(0, 0, window.innerWidth, window.innerHeight);
        confettiFrame = null;
      }
    }

    newButton.addEventListener("click", showNextChallenge);
    window.addEventListener("resize", resizeCanvas);

    shuffleDeck();
    renderChallenge();
    resizeCanvas();
  </script>
